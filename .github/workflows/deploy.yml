name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build for GitHub Pages
        run: npm run build
        env:
          GITHUB_PAGES: "true"
          NITRO_PRESET: github_pages

      - name: Debug build output
        run: |
          echo "Root files:"
          ls -la
          echo ".output directory structure:"
          find .output -type f 2>/dev/null | head -50 || echo "No .output directory found"
          echo ""
          echo "Looking for dist directory:"
          ls -la dist 2>/dev/null || echo "No dist directory found"

      - name: Prepare GitHub Pages files
        run: |
          # Check if .output/public exists, if not check for dist
          if [ -d ".output/public" ]; then
            OUTPUT_DIR=".output/public"
          elif [ -d "dist" ]; then
            OUTPUT_DIR="dist"
          else
            echo "ERROR: No build output directory found!"
            ls -la
            exit 1
          fi
          
          echo "Using output directory: $OUTPUT_DIR"
          test -f "$OUTPUT_DIR/index.html" || { echo "ERROR: index.html not found in $OUTPUT_DIR"; ls -la "$OUTPUT_DIR"; exit 1; }
          
          cp "$OUTPUT_DIR/index.html" "$OUTPUT_DIR/404.html"
          touch "$OUTPUT_DIR/.nojekyll"
          
          # Save the output dir for next step
          echo "OUTPUT_DIR=$OUTPUT_DIR" >> $GITHUB_ENV

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.OUTPUT_DIR }}

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4