name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static site for GitHub Pages
        run: npm run build
        env:
          GITHUB_PAGES: "true"
          NITRO_PRESET: github_pages

      - name: Debug output
        run: |
          echo "All generated files:"
          find . -maxdepth 5 -type f | sed 's#^\./##' | sort | head -200

      - name: Prepare GitHub Pages files
        run: |
          if [ -f ".output/public/index.html" ]; then
            echo "Using .output/public"
            cp .output/public/index.html .output/public/404.html
            touch .output/public/.nojekyll
          else
            echo "ERROR: .output/public/index.html not found"
            echo "Your app is still building SSR output, not static GitHub Pages output."
            echo "Check vite.config.ts prerender + pages config."
            exit 1
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .output/public

  deploy:
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4