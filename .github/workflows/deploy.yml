name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Verify Vite build output
        run: |
          echo "Dist files:"
          ls -la dist

          echo "Dist index.html:"
          cat dist/index.html

          echo "Checking index.html exists..."
          test -f dist/index.html

          echo "Checking Vite transformed main.tsx..."
          if grep -q "/src/main.tsx" dist/index.html; then
            echo "ERROR: dist/index.html still contains /src/main.tsx"
            exit 1
          else
            echo "OK: Vite build transformed index.html correctly."
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5