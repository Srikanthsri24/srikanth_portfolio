name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static site for GitHub Pages
        run: npm run build
        env:
          GITHUB_PAGES: "true"

      - name: Prepare GitHub Pages files
        run: |
          # Vite outputs to dist/
          if [ -f "dist/index.html" ]; then
            echo "Found dist/ - preparing for GitHub Pages"
            cp dist/index.html dist/404.html
            touch dist/.nojekyll
            echo "OUTPUT_DIR=dist" >> $GITHUB_ENV
          else
            echo "ERROR: No build output found at dist/index.html"
            find . -maxdepth 3 -name "index.html" 2>/dev/null || echo "No index.html found"
            exit 1
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.OUTPUT_DIR }}

  deploy:
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4