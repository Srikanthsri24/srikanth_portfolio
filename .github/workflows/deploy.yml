name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Verify build output
        run: |
          echo "Dist files:"
          ls -la dist

          echo "Built index.html:"
          cat dist/index.html

          if [ ! -f "dist/index.html" ]; then
            echo "ERROR: dist/index.html not found"
            exit 1
          fi

          if grep -q "/src/main.tsx" dist/index.html; then
            echo "ERROR: Build failed. dist/index.html still contains /src/main.tsx"
            exit 1
          fi

          echo "OK: Vite build is correct"

      - name: Add SPA fallback
        run: |
          cp dist/index.html dist/404.html

      - name: Add custom domain
        run: |
          echo "srikanthsri.com" > dist/CNAME

      - name: Disable Jekyll
        run: |
          touch dist/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
